name: Docker

on:
  push:
    branches:
      - main
    paths:
      - "api/**"
      - "host/**"
      - "ui/**"
      - "packages/**"
      - "plugins/**"
      - "package.json"
      - "bun.lock"
      - "Dockerfile"
      - ".github/workflows/docker.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  lint:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Security audit
        run: bun audit || true

      - name: Run Biome lint check
        run: bun lint

      - name: Run Biome format check
        run: bun format:check

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build workspace packages
        run: |
          bun run --cwd packages/every-plugin build || true
          bun run --cwd packages/everything-dev build || true

      - name: Run typecheck
        run: bun typecheck

  integration-tests:
    name: Integration Tests
    timeout-minutes: 30
    runs-on: ubuntu-latest
    needs: [lint, typecheck]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: api
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      API_DATABASE_URL: postgres://postgres:postgres@localhost:5432/api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        working-directory: ./api

      - name: Run database migrations
        run: bun run db:migrate
        working-directory: ./api
        env:
          API_DATABASE_URL: postgres://postgres:postgres@localhost:5432/api

      - name: Run integration tests
        run: bun test
        working-directory: ./api
        env:
          API_DATABASE_URL: postgres://postgres:postgres@localhost:5432/api

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: api/coverage/

  build-and-push:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, integration-tests]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lowercase repository name
        run: echo "REPO=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.REPO }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
