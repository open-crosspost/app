name: Preview Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_target:
    types: [closed]

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    name: Preview PR ${{ github.event.pull_request.number }}
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    environment: preview
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read domain from config
        id: config
        run: |
          DOMAIN=$(jq -r '.domain' bos.config.json)
          echo "domain=${DOMAIN}" >> $GITHUB_OUTPUT
          echo "preview_domain=pr-${{ github.event.pull_request.number }}.${DOMAIN}" >> $GITHUB_OUTPUT

      - name: Lowercase repository name
        run: echo "REPO=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.REPO }}
          tags: |
            type=raw,value=pr-${{ github.event.pull_request.number }}
            type=sha

      - name: Build and push preview image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Comment preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const imageTag = `ghcr.io/${process.env.REPO}:pr-${prNumber}`;
            const domain = `${{ steps.config.outputs.preview_domain }}`;

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: [
                '### Preview Deployment',
                '',
                `**Image:** \`${imageTag}\``,
                `**Domain:** \`${domain}\``,
                '',
                'Railway will auto-deploy from the `:pr-' + prNumber + '` tag.',
                '',
                '> This preview uses the staging database and the production UI/API.',
              ].join('\n')
            });

  cleanup-preview:
    name: Cleanup PR ${{ github.event.pull_request.number }}
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Comment preview cleanup
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: '### Preview Cleaned Up\n\nThe preview deployment for this PR has been removed.'
            });