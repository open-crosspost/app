name: Release Sync

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy:
        description: "Build/deploy all workspaces before publish"
        required: false
        default: true
        type: boolean

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Build, Deploy & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    env:
      ZE_SECRET_TOKEN: ${{ secrets.ZEPHYR_AUTH_TOKEN }}
      ZE_SERVER_TOKEN: ${{ secrets.ZEPHYR_SERVER_AUTH_TOKEN }}
      ZE_USER_EMAIL: ${{ secrets.ZEPHYR_USER_EMAIL }}
      BOS_INSTALL_NEAR_CLI: "true"
      NEAR_PRIVATE_KEY: ${{ secrets.NEAR_PRIVATE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.20"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint and typecheck
        run: |
          bun lint
          bun typecheck

      - name: Build and deploy
        if: inputs.deploy != false
        run: bun run deploy

      - name: Publish config to FastKV
        run: bos publish

      - name: Commit bos.config.json updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update deployment URLs [skip ci]"
          file_pattern: bos.config.json

      - name: Lowercase repository name
        run: echo "REPO=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.REPO }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deployment summary
        run: |
          echo "## Release Sync Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Zephyr:** UI, API, plugins deployed" >> $GITHUB_STEP_SUMMARY
          echo "**Docker:** \`ghcr.io/${{ env.REPO }}:latest\` pushed" >> $GITHUB_STEP_SUMMARY
          echo "**FastKV:** bos.config.json published" >> $GITHUB_STEP_SUMMARY
